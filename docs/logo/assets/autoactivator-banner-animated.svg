<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <title>AutoActivator — cd into a project and the venv activates</title>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4B8BBE"/>
      <stop offset="1" stop-color="#3776AB"/>
    </linearGradient>
    <clipPath id="typeclip"><rect id="clipR" x="330" y="194" width="240" height="40"/></clipPath>
  </defs>
  <style>
    /* One 6.5s cycle: idle, type (13 steps), hold, venv line appears, hold, fade, replay.
       Base attributes are the finished scene, so with animations off (reduced motion,
       old renderers) this degrades to the static banner. */
    #clipR{animation:type 6.5s infinite}
    @keyframes type{0%{width:0}8%{width:0;animation-timing-function:steps(13,end)}30%{width:240}100%{width:240}}
    #typed{animation:fadeout 6.5s infinite}
    @keyframes fadeout{0%,91%{opacity:1}96%,100%{opacity:0}}
    #cur1{animation:cur1v 6.5s infinite}
    @keyframes cur1v{0%,34%{opacity:1}35%,100%{opacity:0}}
    #cur1r{animation:blink 1.05s steps(1) infinite,curx 6.5s infinite}
    @keyframes curx{0%{transform:translateX(0)}8%{transform:translateX(0);animation-timing-function:steps(13,end)}30%{transform:translateX(240px)}100%{transform:translateX(240px)}}
    #line2{animation:l2 6.5s infinite}
    @keyframes l2{0%,40%{opacity:0}43%,91%{opacity:1}96%,100%{opacity:0}}
    #cur2r{animation:blink 1.05s steps(1) infinite}
    @keyframes blink{50%{opacity:0}}
    @media (prefers-reduced-motion:reduce){#clipR,#typed,#cur1,#cur1r,#line2,#cur2r{animation:none}}
  </style>
  <!-- terminal card -->
  <rect x="8" y="8" width="1264" height="304" rx="28" fill="#0F1724" stroke="#243248" stroke-width="2"/>
  <!-- window dots -->
  <circle cx="52" cy="54" r="9" fill="#FF5F57"/>
  <circle cx="86" cy="54" r="9" fill="#FEBC2E"/>
  <circle cx="120" cy="54" r="9" fill="#28C840"/>
  <!-- Prompt Hook glyph -->
  <g transform="translate(66, 78) scale(0.72)">
    <circle cx="66" cy="52" r="14" fill="none" stroke="#FFD43B" stroke-width="13"/>
    <path d="M 80 60 L 170 128 L 114 170 C 88 190 90 222 126 226 C 158 229 174 206 173 184"
          fill="none" stroke="url(#blue)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 160 181 L 186 189 L 168 146 Z" fill="#3776AB"/>
  </g>
  <!-- wordmark -->
  <text x="292" y="158" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="74" font-weight="bold" fill="#EDF2F9" textLength="577" lengthAdjust="spacingAndGlyphs">AutoActivator</text>
  <!-- line 1: prompt, typed command, tracking cursor -->
  <text x="296" y="224" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="30" fill="#4B8BBE">&#10095;</text>
  <g id="typed"><text x="332" y="224" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="30" fill="#9FB0C3" textLength="234" lengthAdjust="spacingAndGlyphs" clip-path="url(#typeclip)">cd my-project</text></g>
  <g id="cur1" opacity="0"><rect id="cur1r" x="332" y="200" width="16" height="30" fill="#FFD43B"/></g>
  <!-- line 2: activated venv prompt with blinking cursor -->
  <g id="line2">
    <text x="296" y="272" font-family="DejaVu Sans Mono, Menlo, Consolas, monospace" font-size="30"><tspan fill="#34D399">(.venv)</tspan><tspan fill="#4B8BBE"> &#10095;</tspan></text>
    <rect id="cur2r" x="472" y="248" width="16" height="30" fill="#FFD43B"/>
  </g>
</svg>

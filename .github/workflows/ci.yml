name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install zsh
        run: sudo apt-get install -y --no-install-recommends zsh

      - name: Branded install copy (docs/setup.sh) is in sync
        run: diff -q setup.sh docs/setup.sh

      - name: Syntax check (bash)
        run: |
          bash -n setup.sh
          bash -n activator.sh
          bash -n autoactivator_config.sh
          bash -n _constants.sh
          bash -n tests/test_activator.sh
          bash -n tests/test_subcommands.sh
          bash -n tests/test_setup.sh
          bash -n bench/bench.sh

      - name: Syntax check (zsh)
        run: |
          zsh -n activator.sh
          zsh -n autoactivator_config.sh
          zsh -n _constants.sh
          zsh -n tests/test_activator.sh
          zsh -n tests/test_subcommands.sh
          zsh -n bench/bench.sh

      - name: shellcheck
        run: |
          shellcheck --severity=warning setup.sh bench/bench.sh
          shellcheck --shell=bash --severity=warning activator.sh
          shellcheck --shell=bash --severity=warning autoactivator_config.sh
          shellcheck --shell=bash --severity=warning _constants.sh
          shellcheck --shell=bash --severity=warning tests/test_activator.sh
          shellcheck --shell=bash --severity=warning tests/test_subcommands.sh
          shellcheck --shell=bash --severity=warning tests/test_setup.sh

      - name: Activator tests (bash)
        run: bash tests/test_activator.sh

      - name: Activator tests (zsh)
        run: zsh tests/test_activator.sh

      - name: Subcommand tests (bash)
        run: bash tests/test_subcommands.sh

      - name: Subcommand tests (zsh)
        run: zsh tests/test_subcommands.sh

      # setup.sh is bash-only (piped installs run it under bash), so this
      # suite has no zsh variant.
      - name: Setup tests (bash)
        run: bash tests/test_setup.sh

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      # /bin/bash is pinned so the suite runs on the system bash 3.2 —
      # the no-associative-array code path — not a newer Homebrew bash.
      - name: Activator tests (system bash 3.2)
        run: /bin/bash tests/test_activator.sh

      - name: Activator tests (zsh)
        run: zsh tests/test_activator.sh

      - name: Subcommand tests (system bash 3.2)
        run: /bin/bash tests/test_subcommands.sh

      - name: Subcommand tests (zsh)
        run: zsh tests/test_subcommands.sh

      # The system bash 3.2 is exactly what a piped install runs under on
      # macOS, so this is the highest-value environment for the installer.
      - name: Setup tests (system bash 3.2)
        run: /bin/bash tests/test_setup.sh

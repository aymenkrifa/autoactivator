name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: |
          bash -n setup.sh
          bash -n activator.sh
          bash -n autoactivator_config.sh

      - name: shellcheck
        run: |
          shellcheck --severity=warning setup.sh
          shellcheck --shell=bash --severity=warning activator.sh
          shellcheck --shell=bash --severity=warning autoactivator_config.sh

      - name: Install zsh
        run: sudo apt-get install -y --no-install-recommends zsh

      - name: Tests (bash)
        run: bash tests/test_activator.sh

      - name: Tests (zsh)
        run: zsh tests/test_activator.sh
